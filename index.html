<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .sharp-orange { background: linear-gradient(135deg, #FF6200, #FF8A00); }
        .pin-input { letter-spacing: 8px; font-size: 1.5rem; }
        .bank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .bank-item:hover, .bank-item.selected {
            background-color: #1A2333;
            border-color: #FF6200;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">
    <div class="max-w-md mx-auto bg-[#0A0F1C] min-h-screen shadow-2xl overflow-hidden border border-blue-900">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-[#001F3F] to-[#003366] text-white p-6 border-b border-orange-500">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-arrow-right-from-bracket text-3xl text-orange-400"></i>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">WITHDRAWAL</h1>
                    <p class="text-blue-300 text-sm">Secure Fund Transfer</p>
                </div>
            </div>
        </div>

        <div class="p-6 space-y-8">
            <!-- Account Details -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">ACCOUNT NUMBER</label>
                    <input id="accountNumber" type="text" placeholder="Enter account number"
                           class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">ACCOUNT NAME</label>
                    <input id="accountName" type="text" placeholder="Enter account name"
                           class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">AMOUNT (₦)</label>
                    <div class="relative">
                        <span class="absolute left-5 top-4 text-orange-400 font-bold">₦</span>
                        <input id="amount" type="number" placeholder="0.00"
                               class="w-full pl-12 pr-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                    </div>
                </div>

                <!-- Bank Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">BANK NAME</label>
                    <button onclick="showBankModal()" id="selectedBankDisplay"
                            class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl flex items-center justify-between text-left hover:border-orange-500">
                        <span id="bankText" class="text-gray-400">Select Bank</span>
                        <i class="fa-solid fa-chevron-down text-gray-400"></i>
                    </button>
                </div>
            </div>

            <!-- Proceed Button -->
            <button onclick="initiateWithdrawal()" 
                    class="w-full sharp-orange hover:brightness-110 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg shadow-orange-600/50 transition-all active:scale-95">
                <i class="fa-solid fa-paper-plane"></i>
                <span>PROCEED TO WITHDRAW</span>
            </button>

            <!-- Receipt Section -->
            <div id="receiptSection" class="hidden space-y-8 pt-6 border-t border-blue-900">
                <!-- Receipt Upload -->
                <div>
                    <div class="text-center">
                        <h3 class="font-bold text-xl text-orange-400">Upload Receipt</h3>
                        <p class="text-gray-400 text-sm mt-1">Proof of transaction</p>
                    </div>
                    <div id="uploadArea" class="border-2 border-dashed border-blue-700 hover:border-orange-500 rounded-3xl p-10 text-center cursor-pointer transition-colors bg-[#1A2333] mt-4">
                        <input type="file" id="receiptUpload" accept="image/*,.pdf" class="hidden">
                        <label for="receiptUpload" class="cursor-pointer block">
                            <i class="fa-solid fa-cloud-arrow-up text-5xl text-orange-400 mb-4"></i>
                            <p class="font-semibold text-white">Tap to upload receipt</p>
                            <p class="text-xs text-gray-500 mt-2">JPG, PNG, PDF • Max 5MB</p>
                        </label>
                    </div>
                    <div id="filePreview" class="hidden bg-[#1A2333] border border-green-600 rounded-2xl p-4 flex items-center gap-3 mt-4">
                        <i class="fa-solid fa-file-image text-green-500 text-2xl"></i>
                        <div class="flex-1 truncate">
                            <p id="fileName" class="text-sm font-medium text-white"></p>
                        </div>
                        <button onclick="removeFile()" class="text-red-400 hover:text-red-500">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>

                <!-- Pay for Withdrawal Code -->
                <div class="bg-gradient-to-r from-orange-500 to-amber-600 rounded-3xl p-5 text-center">
                    <p class="text-sm font-medium">Pay for Withdrawal Code</p>
                    <p class="text-3xl font-bold text-white mt-1">₦7,000</p>
                    <p class="text-xs text-orange-100 mt-1">Instant activation after payment</p>
                </div>

                <!-- Account Details -->
                <div class="bg-[#1A2333] border border-blue-800 rounded-3xl p-5 space-y-4">
                    <h4 class="text-orange-400 font-semibold text-center mb-3">💳 Account Details</h4>
                    <div class="grid grid-cols-2 gap-x-6 gap-y-4 text-sm">
                        <div>
                            <span class="text-gray-500 block text-xs">🏦 Bank</span>
                            <span class="font-medium text-white">PALMPAY</span>
                        </div>
                        <div>
                            <span class="text-gray-500 block text-xs">👤 Account Name</span>
                            <span class="font-medium text-white">telipress_Emm</span>
                        </div>
                        <div>
                            <span class="text-gray-500 block text-xs">🔢 Account Number</span>
                            <span class="font-medium text-white">6633186540</span>
                        </div>
                    </div>
                </div>

                <!-- 4-Digit Code -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">ENTER 4-DIGIT WITHDRAWAL CODE</label>
                    <input id="withdrawalCode" type="password" maxlength="4" inputmode="numeric"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                           class="pin-input w-full px-5 py-6 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-center text-3xl tracking-widest">
                    <p id="codeError" class="text-red-500 text-sm mt-2 text-center hidden">❌ Wrong Code. Please try again.</p>
                </div>

                <button onclick="confirmWithdrawal()" 
                        class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg shadow-blue-600/50 transition-all active:scale-95">
                    <i class="fa-solid fa-check-circle"></i>
                    <span>CONFIRM WITHDRAWAL</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Bank Modal and Notification Modal (same as before) -->
    <!-- ... Bank Modal and Notification Modal code ... -->

    <script>
        // File Upload - FIXED
        const fileInput = document.getElementById('receiptUpload');
        const uploadArea = document.getElementById('uploadArea');
        const filePreview = document.getElementById('filePreview');
        const fileNameEl = document.getElementById('fileName');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                fileNameEl.textContent = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name;
                uploadArea.classList.add('hidden');
                filePreview.classList.remove('hidden');
            }
        });

        function removeFile() {
            fileInput.value = '';
            uploadArea.classList.remove('hidden');
            filePreview.classList.add('hidden');
        }

        // Rest of your script (bank modal, notification, etc.)
        const banks = [ /* ... same banks array ... */ ];

        // ... (keep all other functions: renderBankList, showBankModal, etc.)

        document.addEventListener('DOMContentLoaded', () => {
            renderBankList();
        });
    </script>
</body>
</html>
