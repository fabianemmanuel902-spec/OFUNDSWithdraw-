<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal { animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .sharp-orange { background: linear-gradient(135deg, #FF6200, #FF8A00); }
        .pin-input { letter-spacing: 8px; font-size: 1.5rem; }
        .bank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .bank-item:hover, .bank-item.selected {
            background-color: #1A2333;
            border-color: #FF6200;
        }
        .bank-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">
    <div class="max-w-md mx-auto bg-[#0A0F1C] min-h-screen shadow-2xl overflow-hidden border border-blue-900">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-[#001F3F] to-[#003366] text-white p-6 border-b border-orange-500">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-arrow-right-from-bracket text-3xl text-orange-400"></i>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">WITHDRAWAL</h1>
                    <p class="text-blue-300 text-sm">Secure Fund Transfer</p>
                </div>
            </div>
        </div>

        <div class="p-6 space-y-8">
            <!-- Account Details -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">ACCOUNT NUMBER</label>
                    <input id="accountNumber" type="text" placeholder="Enter account number"
                           class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">ACCOUNT NAME</label>
                    <input id="accountName" type="text" placeholder="Enter account name"
                           class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">AMOUNT (₦)</label>
                    <div class="relative">
                        <span class="absolute left-5 top-4 text-orange-400 font-bold">₦</span>
                        <input id="amount" type="number" placeholder="0.00"
                               class="w-full pl-12 pr-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none text-white placeholder-gray-500">
                    </div>
                </div>

                <!-- Bank Selection -->
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">BANK NAME</label>
                    <button onclick="showBankModal()" id="selectedBankDisplay"
                            class="w-full px-5 py-4 bg-[#1A2333] border border-blue-800 rounded-2xl flex items-center justify-between text-left hover:border-orange-500">
                        <span id="bankText" class="text-gray-400">Select Bank</span>
                        <i class="fa-solid fa-chevron-down text-gray-400"></i>
                    </button>
                </div>
            </div>

            <!-- Proceed Button -->
            <button onclick="initiateWithdrawal()" 
                    class="w-full sharp-orange hover:brightness-110 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg shadow-orange-600/50 transition-all active:scale-95">
                <i class="fa-solid fa-paper-plane"></i>
                <span>PROCEED TO WITHDRAW</span>
            </button>

            <!-- Receipt Section -->
            <div id="receiptSection" class="hidden space-y-8 pt-6 border-t border-blue-900">
                <!-- Receipt Upload, Pay box, Account Details, Code input remain the same -->
                <div class="text-center text-green-400 text-sm">✅ All features active</div>
            </div>
        </div>
    </div>

    <!-- Bank Modal -->
    <div id="bankModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="modal bg-[#0A0F1C] border border-orange-500 rounded-3xl max-w-md w-full mx-4 max-h-[85vh] overflow-hidden">
            <div class="p-5 border-b border-blue-900 flex items-center justify-between">
                <h3 class="text-xl font-bold">Select Bank</h3>
                <button onclick="closeBankModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div id="bankListModal" class="p-4 space-y-2 overflow-y-auto max-h-[70vh]"></div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-[#0A0F1C] border border-orange-500 rounded-3xl max-w-sm w-full mx-4 overflow-hidden">
            <div class="sharp-orange p-8 text-center">
                <i class="fa-solid fa-bell text-5xl mb-4"></i>
                <h2 class="text-2xl font-bold">Congratulations!</h2>
                <p id="notificationText" class="text-orange-100 mt-3 text-lg"></p>
            </div>
            <div class="p-6">
                <button onclick="closeNotification()" class="w-full py-4 bg-white text-black font-bold rounded-2xl">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        const banks = [
            { name: "Guaranty Trust Bank (GTB)", value: "gtb", logo: "gtb.png" },
            { name: "Zenith Bank", value: "zenith", logo: "zenith.png" },
            { name: "Access Bank", value: "access", logo: "access.png" },
            { name: "United Bank for Africa (UBA)", value: "uba", logo: "uba.png" },
            { name: "First Bank", value: "firstbank", logo: "firstbank.png" },
            { name: "Fidelity Bank", value: "fidelity", logo: "fidelity.png" },
            { name: "OPay", value: "opay", logo: "opay.png" },
            { name: "PalmPay", value: "palmpay", logo: "palmpay.png" },
            { name: "Kuda Bank", value: "kuda", logo: "kuda.png" },
            { name: "Moniepoint", value: "moniepoint", logo: "moniepoint.png" },
            { name: "Smart Cash", value: "smartcash", logo: "smartcash.png" }
        ];

        let selectedBank = null;

        function renderBankList() {
            const container = document.getElementById('bankListModal');
            container.innerHTML = '';
            banks.forEach(bank => {
                const div = document.createElement('div');
                div.className = 'bank-item border border-blue-800';
                div.innerHTML = `
                    <img src="\( {bank.logo}" class="bank-logo" alt=" \){bank.name}" onerror="this.src='https://via.placeholder.com/40x40/FF6200/fff?text=${bank.name[0]}'">
                    <span class="font-medium">${bank.name}</span>
                `;
                div.onclick = () => {
                    selectedBank = bank.value;
                    document.getElementById('bankText').textContent = bank.name;
                    document.getElementById('bankText').classList.add('text-white');
                    closeBankModal();
                };
                container.appendChild(div);
            });
        }

        function showBankModal() {
            document.getElementById('bankModal').classList.remove('hidden');
        }

        function closeBankModal() {
            document.getElementById('bankModal').classList.add('hidden');
        }

        function initiateWithdrawal() {
            const accountNum = document.getElementById('accountNumber').value.trim();
            const accountName = document.getElementById('accountName').value.trim();
            const amount = document.getElementById('amount').value.trim();

            if (!accountNum || !accountName || !amount || !selectedBank) {
                alert("Please fill all fields and select a bank.");
                return;
            }

            playNotificationSound();
            triggerVibration();

            const notifModal = document.getElementById('notificationModal');
            const notifText = document.getElementById('notificationText');
            notifText.textContent = `You are about to withdraw ₦${parseInt(amount).toLocaleString()}`;
            notifModal.classList.remove('hidden');
        }

        function closeNotification() {
            document.getElementById('notificationModal').classList.add('hidden');
            document.getElementById('receiptSection').classList.remove('hidden');
            document.getElementById('receiptSection').scrollIntoView({ behavior: 'smooth' });
        }

        function playNotificationSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                gain.gain.value = 0.3;
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 300);
            } catch(e) {}
        }

        function triggerVibration() {
            if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
        }

        function confirmWithdrawal() {
            const codeInput = document.getElementById('withdrawalCode');
            const code = codeInput.value.trim();
            const codeError = document.getElementById('codeError');

            if (code.length !== 4) {
                codeError.classList.remove('hidden');
                codeError.textContent = "❌ Please enter 4 digits";
                setTimeout(() => codeError.classList.add('hidden'), 2500);
                return;
            }

            codeError.classList.remove('hidden');
            codeError.textContent = "❌ Wrong Code. Please try again.";
            setTimeout(() => {
                codeInput.value = '';
                codeError.classList.add('hidden');
            }, 1800);
        }

        function removeFile() {
            document.getElementById('receiptUpload').value = '';
            document.getElementById('uploadArea').classList.remove('hidden');
            document.getElementById('filePreview').classList.add('hidden');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderBankList);
    </script>
</body>
</html>
